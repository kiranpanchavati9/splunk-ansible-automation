---
- name: Configure SHC settings
  community.general.ini_file:
    path: "{{ splunk_home }}/etc/system/local/server.conf"
    section: shclustering
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: splunk
    group: splunk
    mode: "0644"
    no_extra_spaces: true
  loop:
    - option: disabled
      value: "false"
    - option: mgmt_uri
      value: "https://{{ inventory_hostname }}:8089"
    - option: replication_factor
      value: "{{ shcluster_replication_factor }}"
    - option: conf_deploy_fetch_url
      value: "https://{{ deployer_host }}:8089"
    - option: shcluster_label
      value: "{{ shcluster_label }}"
    - option: pass4SymmKey
      value: "{{ shcluster_secret }}"

- name: Configure Splunk server name
  community.general.ini_file:
    path: "{{ splunk_home }}/etc/system/local/server.conf"
    section: general
    option: serverName
    value: "{{ inventory_hostname }}"
    owner: splunk
    group: splunk
    mode: "0644"
    no_extra_spaces: true

- name: Configure SHC replication port
  community.general.ini_file:
    path: "{{ splunk_home }}/etc/system/local/server.conf"
    section: "replication_port://{{ shcluster_replication_port }}"
    allow_no_value: true
    owner: splunk
    group: splunk
    mode: "0644"

- name: Configure indexer cluster connection
  community.general.ini_file:
    path: "{{ splunk_home }}/etc/system/local/server.conf"
    section: clustering
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: splunk
    group: splunk
    mode: "0644"
    no_extra_spaces: true
  loop:
    - option: mode
      value: searchhead
    - option: manager_uri
      value: "https://{{ cluster_manager_host }}:8089"
    - option: pass4SymmKey
      value: "{{ idxc_secret }}"

- name: Restart Splunk
  ansible.builtin.command:
    cmd: "{{ splunk_home }}/bin/splunk restart"